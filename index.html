<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<title>אביקו — מטבח איטלקי נודד</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Caveat:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Mamilla — display / headings */
  @font-face { font-family:'Mamilla'; font-weight:300; font-display:swap;
    src:url('fonts/Mamilla-Light.woff2') format('woff2'); }
  @font-face { font-family:'Mamilla'; font-weight:400; font-display:swap;
    src:url('fonts/Mamilla-Regular.woff2') format('woff2'); }
  @font-face { font-family:'Mamilla'; font-weight:500; font-display:swap;
    src:url('fonts/Mamilla-Medium.woff2') format('woff2'); }
  @font-face { font-family:'Mamilla'; font-weight:600; font-display:swap;
    src:url('fonts/Mamilla-SemiBold.woff2') format('woff2'); }
  @font-face { font-family:'Mamilla'; font-weight:700; font-display:swap;
    src:url('fonts/Mamilla-Bold.woff2') format('woff2'); }
  @font-face { font-family:'Mamilla'; font-weight:800; font-display:swap;
    src:url('fonts/Mamilla-ExtraBold.woff2') format('woff2'); }

  /* Aviv — body / UI */
  @font-face { font-family:'FupAviv'; font-weight:300; font-display:swap;
    src:url('fonts/Aviv-Light.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:400; font-display:swap;
    src:url('fonts/Aviv-Regular.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:500; font-display:swap;
    src:url('fonts/Aviv-Medium.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:600; font-display:swap;
    src:url('fonts/Aviv-SemiBold.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:700; font-display:swap;
    src:url('fonts/Aviv-Bold.woff2') format('woff2'); }
  @font-face { font-family:'FupAviv'; font-weight:800; font-display:swap;
    src:url('fonts/Aviv-ExtraBold.woff2') format('woff2'); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --ink:#0E0D0B;
    --ink-2:#171512;
    --ink-3:#22201B;
    --paper:#F4EEDC;
    --paper-2:#EBE2CA;
    --paper-muted:#C9BFA4;
    --ember: oklch(0.66 0.16 42);       /* warm terracotta */
    --ember-deep: oklch(0.54 0.17 38);
    --it-green:#2E6B48;
    --it-red:#B23A2E;
    --rule: rgba(244,238,220,0.18);
    --rule-dark: rgba(14,13,11,0.15);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--paper);font-family:'FupAviv','Heebo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .serif{font-family:'Mamilla','Playfair Display', Georgia, serif;font-weight:400;letter-spacing:-0.01em}
  .italic-en{font-family:'Playfair Display', Georgia, serif;font-style:italic;font-weight:400}
  .hand{font-family:'Caveat', cursive}
  .mono{font-family:'JetBrains Mono', ui-monospace, monospace;letter-spacing:0.02em}
  .tick{font-family:'JetBrains Mono', ui-monospace, monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase}
  .rule{height:1px;background:var(--rule);width:100%}
  /* utility */
  .container{max-width:1320px;margin:0 auto;padding:0 40px}
  @media (max-width:780px){.container{padding:0 20px}}

  /* Scroll-in */
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .9s ease, transform .9s ease}
  .reveal.in{opacity:1;transform:none}

  /* Marquee */
  .marquee{display:flex;gap:64px;animation:scroll 26s linear infinite;white-space:nowrap}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;border-radius:999px;font-weight:500;font-size:15px;transition:transform .2s ease, background .2s ease, color .2s ease;cursor:pointer;border:none;font-family:inherit}
  .btn-primary{background:var(--paper);color:var(--ink)}
  .btn-primary:hover{background:var(--ember);color:var(--paper);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--paper);border:1px solid var(--rule)}
  .btn-ghost:hover{border-color:var(--paper);background:rgba(244,238,220,0.06)}
  .btn-ink{background:var(--ink);color:var(--paper)}
  .btn-ink:hover{background:var(--ember);color:var(--paper)}

  /* flag chip */
  .flag{display:inline-flex;border-radius:2px;overflow:hidden;border:1px solid rgba(244,238,220,0.2);height:10px;width:18px}
  .flag span{flex:1}
  .flag span:nth-child(1){background:#2E6B48}
  .flag span:nth-child(2){background:#F4EEDC}
  .flag span:nth-child(3){background:#B23A2E}

  /* Placeholder patterns */
  .ph-stripes{background-image:repeating-linear-gradient(135deg, rgba(244,238,220,0.06) 0 10px, rgba(244,238,220,0.02) 10px 20px);background-color:var(--ink-2)}

  /* Parallax hero image subtle zoom */
  .hero-bg{object-position:center 35%}
  .kenburns{animation:kb 18s ease-in-out infinite alternate}
  @keyframes kb{from{transform:scale(1.04)}to{transform:scale(1.12)}}

  /* Package card ornate number */
  .ornament-num{font-family:'Playfair Display';font-style:italic;font-weight:400;line-height:1}

  /* Scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--ink-2)}
  ::-webkit-scrollbar-thumb{background:var(--ink-3);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:var(--paper-muted)}

  /* Tweaks panel */
  .tweaks{position:fixed;bottom:20px;left:20px;z-index:100;background:var(--ink-2);border:1px solid var(--rule);border-radius:14px;padding:16px;width:280px;color:var(--paper);box-shadow:0 20px 50px rgba(0,0,0,0.4);font-size:13px}
  .tweaks h4{margin:0 0 10px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--paper-muted);font-family:'JetBrains Mono',monospace;font-weight:500}
  .tweaks label{display:block;margin:12px 0 6px;font-size:12px;color:var(--paper-muted)}
  .tweaks .swatches{display:flex;gap:8px}
  .tweaks .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
  .tweaks .swatch.active{border-color:var(--paper)}
  .tweaks select{width:100%;padding:8px 10px;background:var(--ink);color:var(--paper);border:1px solid var(--rule);border-radius:8px;font-family:inherit;font-size:13px}

  /* RTL anim fixes */
  [dir="rtl"] .marquee{animation-direction:normal}

  /* Hero mask overlay */
  .hero-mask{background:linear-gradient(180deg, rgba(14,13,11,0.2) 0%, rgba(14,13,11,0.55) 60%, var(--ink) 100%)}

  /* Gallery tilt */
  .tilt{transition:transform .6s cubic-bezier(.2,.8,.2,1), filter .6s ease}
  .tilt:hover{transform:translateY(-6px) rotate(-0.4deg);filter:brightness(1.08)}

  /* Selected package glow */
  .pkg-glow{box-shadow:0 0 0 1px var(--ember), 0 30px 80px -40px var(--ember)}

  /* RTL keep numbers LTR */
  .ltr{direction:ltr;unicode-bidi:embed;display:inline-block}

  /* wiggle on hover sticker */
  .sticker{transition:transform .3s ease}
  .sticker:hover{transform:rotate(-8deg) scale(1.05)}

  /* Full-bleed */
  .bleed{width:100vw;margin-left:calc(50% - 50vw);margin-right:calc(50% - 50vw)}

  /* ---------- MOBILE ---------- */
  @media (max-width:860px){
    /* Kill any horizontal overflow at the document root — prevents
       the RTL vertical scrollbar (which sits on the visual-left in RTL)
       from overlapping fixed elements. */
    html{overflow-x:hidden}
    /* Nav: drop desktop links, keep logo + CTA */
    .nav-links{display:none !important}
    nav{padding-top:12px !important;padding-bottom:12px !important}
    /* Asymmetric padding: extra on physical-left so the CTA (flex-end
       in RTL = visual left) clears the RTL scrollbar gutter. */
    nav .container{padding:0 18px 0 22px !important;gap:10px !important}
    /* Compact CTA — no chevron, tighter text */
    nav .btn-primary{padding:8px 14px !important;font-size:12px !important;gap:6px !important;white-space:nowrap}
    nav .btn-primary svg{display:none !important}
    /* Compact logo — hide small AVIKCO·EST subtitle, shrink brand */
    nav .mono{display:none !important}
    nav svg{width:26px !important;height:26px !important}
    nav .serif{font-size:18px !important}

    /* Universal section paddings */
    section{padding-top:70px !important;padding-bottom:70px !important}

    /* Every 2+ column grid collapses to one column */
    .m-stack{grid-template-columns:1fr !important;gap:40px !important}

    /* Hero */
    .hero-eyebrow .flex-rule{display:none !important}
    .hero-eyebrow .eyebrow-num{display:none !important}
    .hero-eyebrow{font-size:10px !important;gap:10px !important;flex-wrap:wrap !important}
    .hero-grid{grid-template-columns:1fr !important;gap:36px !important;margin-top:36px !important}
    .hero-headline{font-size:44px !important;line-height:1.02 !important}
    .hero-right{align-items:flex-start !important;flex-direction:row !important;flex-wrap:wrap !important;gap:16px !important;width:100% !important}
    .hero-sticker{width:120px !important;height:120px !important}
    .hero-sticker .serif{font-size:32px !important}
    .hero-incl{width:100% !important;flex:1 1 auto !important}
    .hero-scroll-hint{margin-top:30px !important}

    /* Kitchen steps: 4 cols → 1 col stacked */
    .steps-grid{grid-template-columns:1fr !important}
    .steps-grid > div{border-left:none !important;border-bottom:1px solid var(--rule) !important;padding:24px 2px !important}
    .steps-grid > div:last-child{border-bottom:none !important}
    .steps-grid .ornament-num{font-size:48px !important;margin-bottom:8px !important}

    /* Menu tabs: horizontal scroll */
    .menu-tabs{overflow-x:auto !important;flex-wrap:nowrap !important;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .menu-tabs::-webkit-scrollbar{display:none}
    .menu-tabs button{white-space:nowrap !important;padding:14px 16px !important;font-size:14px !important}
    .menu-content img{height:280px !important}

    /* Packages: 3 cols → 1 col */
    .pkg-grid{grid-template-columns:1fr !important;gap:16px !important}
    .pkg-grid > div{padding:28px 22px !important}

    /* Gallery: 4 cols → 2 cols, ignore spans */
    .gallery-grid{grid-template-columns:1fr 1fr !important;grid-auto-rows:150px !important;gap:8px !important}
    .gallery-grid > *{grid-column:auto !important}

    /* Contact: two-up becomes stacked */
    .contact-grid{grid-template-columns:1fr !important;gap:50px !important}

    /* About / Kitchen / Menu heading rows */
    .section-head{flex-direction:column !important;align-items:flex-start !important;gap:16px !important}

    /* Headlines across sections */
    .h-serif-lg{font-size:38px !important;line-height:1.05 !important}

    /* Marquee: faster + smaller text on mobile */
    .marquee{animation-duration:18s !important}
    .marquee .serif{font-size:26px !important}

    /* Hero image: slow horizontal pan instead of the desktop ken-burns zoom,
       so the motion (chef loading the oven) reads clearly at small sizes.
       Uses transform (GPU-reliable) rather than object-position (Chrome
       refuses to interpolate it consistently between percentages). */
    .kenburns{animation:mobilePan 14s ease-in-out infinite alternate !important}
    @keyframes mobilePan{
      from{transform:scale(1.35) translateX(7%)}
      to  {transform:scale(1.35) translateX(-7%)}
    }

    /* Footer big italic word */
    .footer-word{font-size:56px !important;letter-spacing:-0.02em !important}

    /* Quote */
    .quote-mark{font-size:80px !important}

    /* Container shim */
    .container{padding:0 18px !important}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "basil",
  "heroLayout": "portrait",
  "highlightedPackage": "experience"
}/*EDITMODE-END*/;

const ACCENTS = {
  ember:   { name: "טרקוטה", color: "oklch(0.66 0.16 42)", deep: "oklch(0.54 0.17 38)" },
  olive:   { name: "זית",    color: "oklch(0.66 0.12 120)", deep: "oklch(0.48 0.12 120)" },
  basil:   { name: "בזיליקום", color: "oklch(0.62 0.14 155)", deep: "oklch(0.46 0.14 155)" },
  amarone: { name: "אמרונה",  color: "oklch(0.55 0.17 25)", deep: "oklch(0.42 0.17 25)" },
  saffron: { name: "זעפרן",  color: "oklch(0.78 0.14 80)", deep: "oklch(0.62 0.15 75)" },
};

const WHATSAPP_NUMBER = '972547432200';
const PACKAGES = [
  {
    id:'experience', roman:'I', name:'חוויה קולינרית', price:230,
    tagline:'הקלאסיקה.',
    blurb:'ארוחה מלאה מלאה בתפריט שלנו — פתיחה, ראשונות, עיקריות וקינוח. הבחירה הנכונה לרוב האירועים.',
    includes:['תפריט מלא לבחירתכם','טאבון מקצועי','צוות הגשה','כלים חד־פעמיים איכותיים'],
  },
  {
    id:'tasting', roman:'II', name:'ארוחת טעימות', price:250,
    tagline:'עונתי. עשיר.',
    blurb:'כל מה שיש בחוויה הקולינרית, בתוספת 2 מנות טאפאס מהטאבון המשתנות לפי עונה — לחוויית טעמים עשירה יותר.',
    includes:['כל מה שבחוויה קולינרית','2 מנות טאפאס עונתיות','מהטאבון ישירות לצלחת','מגוון טעמים מורחב'],
  },
  {
    id:'premium', roman:'III', name:'פרימיום', price:290,
    tagline:'האירוע המלא.',
    blurb:'חווית הטעימות במלואה, פלוס עריכת שולחן איכותית — ללא חד־פעמי. הגירסה המושקעת ביותר של אביקו.',
    includes:['כל מה שבארוחת טעימות','עריכת שולחן איכותית','ללא כלים חד־פעמיים','חוויה מלאה מא׳ ועד ת׳'],
  },
];
const buildWhatsAppURL = (pkgId) => {
  const p = PACKAGES.find(x => x.id === pkgId);
  const lines = [
    'היי אביקו 👋',
    'אשמח לקבל הצעה לאירוע.',
    '',
    p ? `המסלול שמעניין אותי: ${p.name} (${p.price}₪ לסועד)` : 'עוד לא החלטתי על מסלול.',
    '',
    'פרטים נוספים:',
    '• תאריך משוער:',
    '• מספר סועדים:',
    '• מיקום:',
    '• הערות:',
  ];
  return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(lines.join('\n'))}`;
};

// ---------- Logo (custom, original) ----------
const Logo = ({ size = 32, color = "var(--paper)" }) => (
  <div style={{display:'flex',alignItems:'center',gap:10}}>
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      {/* chef hat silhouette stylized as circle with tomato leaf */}
      <circle cx="20" cy="22" r="14" stroke={color} strokeWidth="1.5" fill="none" />
      <path d="M20 8 C 22 12, 26 12, 28 9" stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round" />
      <circle cx="20" cy="24" r="1.3" fill={color} />
      <path d="M13 22 C 14 19, 16 18, 20 18 C 24 18, 26 19, 27 22" stroke={color} strokeWidth="1.2" fill="none" />
    </svg>
    <div style={{lineHeight:1}}>
      <div className="serif" style={{fontSize:20,fontWeight:700,color,letterSpacing:'-0.01em'}}>אביקו</div>
      <div className="mono" style={{fontSize:8,color,opacity:0.6,marginTop:2,letterSpacing:'0.2em'}}>AVIKCO · EST.</div>
    </div>
  </div>
);

// ---------- Nav ----------
const Nav = () => {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const items = [
    { href: '#about',    label: 'הסיפור' },
    { href: '#kitchen',  label: 'המטבח הנודד' },
    { href: '#menu',     label: 'תפריט' },
    { href: '#packages', label: 'מסלולים' },
    { href: '#gallery',  label: 'גלריה' },
  ];
  return (
    <nav style={{
      position:'fixed',top:0,left:0,right:0,zIndex:50,
      padding: scrolled ? '14px 0' : '22px 0',
      background: scrolled ? 'rgba(14,13,11,0.82)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px) saturate(140%)' : 'none',
      WebkitBackdropFilter: scrolled ? 'blur(12px) saturate(140%)' : 'none',
      borderBottom: scrolled ? '1px solid var(--rule)' : '1px solid transparent',
      transition:'all .35s ease'
    }}>
      <div className="container" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:20}}>
        <Logo />
        <div style={{display:'flex',gap:32,alignItems:'center'}} className="nav-links">
          {items.map(i =>
            <a key={i.href} href={i.href} style={{fontSize:14,color:'var(--paper)',opacity:0.85,transition:'opacity .2s'}}
               onMouseEnter={e=>e.currentTarget.style.opacity=1}
               onMouseLeave={e=>e.currentTarget.style.opacity=0.85}>{i.label}</a>
          )}
        </div>
        <a href="#contact" className="btn btn-primary" style={{padding:'10px 18px',fontSize:13}}>
          הזמנת אירוע
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
      </div>
    </nav>
  );
};

// ---------- Hero ----------
const Hero = () => {
  return (
    <section style={{position:'relative',minHeight:'100vh',overflow:'hidden'}}>
      {/* background image */}
      <div style={{position:'absolute',inset:0,zIndex:0}}>
        <img src="assets/chef-oven.jpeg" className="kenburns hero-bg"
          style={{width:'100%',height:'100%',objectFit:'cover'}}/>
        <div className="hero-mask" style={{position:'absolute',inset:0}}/>
      </div>

      <div className="container" style={{position:'relative',zIndex:2,paddingTop:160,paddingBottom:80,minHeight:'100vh',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
        {/* Top eyebrow row */}
        <div className="hero-eyebrow" style={{display:'flex',alignItems:'center',gap:14,opacity:0.85}}>
          <span className="flag"><span/><span/><span/></span>
          <span className="tick" style={{color:'var(--paper)'}}>מטבח איטלקי נודד · ישראל · 2019</span>
          <div className="flex-rule" style={{flex:1,height:1,background:'var(--rule)'}}/>
          <span className="tick eyebrow-num" style={{color:'var(--paper-muted)'}}>№ 001</span>
        </div>

        {/* headline block */}
        <div className="hero-grid" style={{display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:60,alignItems:'end',marginTop:60}}>
          <div>
            <div className="hand" style={{fontSize:44,color:'var(--ember)',marginBottom:6,transform:'rotate(-2deg)',display:'inline-block'}}>Benvenuti —</div>
            <h1 className="serif hero-headline" style={{
              fontSize:'clamp(48px, 7.2vw, 118px)',
              lineHeight:0.95,
              fontWeight:500,
              margin:'0 0 28px',
              letterSpacing:'-0.025em',
              color:'var(--paper)'
            }}>
              איטליה מעולם<br/>
              לא הייתה <span style={{fontWeight:700}}>קרובה</span> יותר
              <span style={{color:'var(--ember)',fontStyle:'normal'}}>.</span>
            </h1>
            <p style={{fontSize:20,lineHeight:1.55,color:'var(--paper)',opacity:0.82,maxWidth:560,margin:0,fontWeight:300}}>
              טאבון מקצועי, פסטות בעבודת יד, ופיצות נאפוליטניות — מוגשות טריות מול עיני הסועדים שלכם.
              בלי תשתית, בלי לוגיסטיקה, בלי כלים לשטוף בסוף.
            </p>
            <div style={{display:'flex',gap:14,marginTop:36,flexWrap:'wrap'}}>
              <a href="#packages" className="btn btn-primary">
                בחירת מסלול
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>

// ---------- Tweaks Panel ----------
const Tweaks = ({ state, setState }) => {
  const [active, setActive] = useState(false);
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setActive(true);
      if (e.data?.type === '__deactivate_edit_mode') setActive(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const update = (key, val) => {
    const ns = { ...state, [key]: val };
    setState(ns);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]: val } }, '*');
  };

  if (!active) return null;
  return (
    <div className="tweaks">
      <h4>TWEAKS</h4>
      <label>צבע אקצנט</label>
      <div className="swatches">
        {Object.entries(ACCENTS).map(([k,v])=>(
          <div key={k} className={'swatch' + (state.accent===k ? ' active':'')}
               style={{background:v.color}} title={v.name} onClick={()=>update('accent',k)}/>
        ))}
      </div>
      <label>מסלול בולט</label>
      <select value={state.highlightedPackage} onChange={e=>update('highlightedPackage',e.target.value)}>
        <option value="experience">חוויה קולינרית</option>
        <option value="tasting">ארוחת טעימות</option>
        <option value="premium">פרימיום</option>
      </select>
    </div>
  );
};

// ---------- App ----------
const App = () => {
  const [state, setState] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const a = ACCENTS[state.accent] || ACCENTS.ember;
    document.documentElement.style.setProperty('--ember', a.color);
    document.documentElement.style.setProperty('--ember-deep', a.deep);
  }, [state.accent]);

  useEffect(() => {
    // Reveal-on-scroll
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold:0.08 });
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <MarqueeBand />
      <About />
      <Kitchen />
      <Menu />
      <Packages highlighted={state.highlightedPackage} setHighlighted={(v)=>setState({ ...state, highlightedPackage: v })}/>
      <Quote />
      <Gallery />
      <Contact highlighted={state.highlightedPackage} />
      <Footer />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
